# gcWeaselSettings — luna_pinyin 方案覆写
# 关闭 librime 的「数字分隔符」智能识别（见 README / 设置清单）

customization:
  distribution_code_name: Weasel
  distribution_version: 0.17.4
  generator: "Rime::SchemaSettings"
  rime_version: 1.13.1
  schema_id: luna_pinyin

patch:
  # 关闭数字分隔符识别
  # 默认 librime 把数字后的 . , : 当成小数点 / 千位逗号 / 时间冒号，
  # 走 Forward（进候选让你确认），导致 "255。" 要按两次才出。
  # 清空 digit_separators 后，数字后这些标点走普通 AutoCommitPunct，直接上屏中文标点。
  # 代价：失去 "3.14" 式小数点识别（数字后 . 一律变中文句号）；要打纯小数切西文。
  "punctuator/digit_separators": ""
