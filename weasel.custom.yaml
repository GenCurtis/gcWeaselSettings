# gcWeaselSettings — Weasel（小狼毫/RIME）外观配置
# 安装：拷到 %APPDATA%\Rime\，删 build 后重新部署（见 README）。
# 注意：Weasel 部署会把本文件“标准化”（去注释、键字母序）；此仓库版是带注释的源，以仓库为准。

customization:
  distribution_code_name: Weasel
  distribution_version: 0.17.4
  generator: "Weasel::UIStyleSettings"
  rime_version: 1.13.1

patch:
  # ── 配色：Catppuccin Mocha（暗色）──
  # color_format: rgba → 颜色按 CSS 顺序 0xRRGGBB 书写（8 位末两位为 alpha）。
  # 不再做 BGR(0xBBGGRR) 换算，直接抄 Catppuccin 官方色值。
  "preset_color_schemes/mocha":
    name: "摩卡／Catppuccin Mocha"
    author: GenCurtis
    color_format: rgba
    back_color: 0x1E1E2E                          # Base      候选窗背景
    border_color: 0x45475A                        # Surface1  边框
    shadow_color: 0x00000000                      #           无阴影（全透明）
    text_color: 0xCDD6F4                          # Text      编码文字
    hilited_text_color: 0x89B4FA                  # Blue      编码高亮文字
    hilited_back_color: 0x313244                  # Surface0  编码高亮底
    candidate_text_color: 0xBAC2DE                # Subtext1  候选文字
    candidate_back_color: 0x1E1E2E                # Base      候选底
    hilited_candidate_text_color: 0x1E1E2E        # Base      选中候选文字
    hilited_candidate_back_color: 0xCBA6F7        # Mauve     选中候选底（accent）
    comment_text_color: 0x7F849C                  # Overlay1  注释文字
    hilited_comment_text_color: 0x9399B2          # Overlay2  选中行注释

  # ── 配色：Catppuccin Latte（亮色）──
  "preset_color_schemes/latte":
    name: "拿铁／Catppuccin Latte"
    author: GenCurtis
    color_format: rgba
    back_color: 0xEFF1F5                          # Base      候选窗背景
    border_color: 0xBCC0CC                        # Surface1  边框
    shadow_color: 0x00000000                      #           无阴影
    text_color: 0x4C4F69                          # Text      编码文字
    hilited_text_color: 0x1E66F5                  # Blue      编码高亮文字
    hilited_back_color: 0xCCD0DA                  # Surface0  编码高亮底
    candidate_text_color: 0x5C5F77                # Subtext1  候选文字
    candidate_back_color: 0xEFF1F5                # Base      候选底
    hilited_candidate_text_color: 0xEFF1F5        # Base      选中候选文字（底为深 Mauve，字反色用亮 Base）
    hilited_candidate_back_color: 0x8839EF        # Mauve     选中候选底（accent）
    comment_text_color: 0x8C8FA1                  # Overlay1  注释文字
    hilited_comment_text_color: 0x7C7F93          # Overlay2  选中行注释

  # ── 配色切换：系统亮色模式→Latte、暗色模式→Mocha ──
  "style/color_scheme": latte
  "style/color_scheme_dark": mocha

  # ── 排版：横排候选（false=竖排）──
  "style/horizontal": true

  # ── 布局 ──
  "style/layout/candidate_spacing": 16      # 候选词间距（默认 5，横排偏挤调大）
  "style/layout/hilite_spacing": 2          # 序号与候选词间距（默认 4）
  "style/layout/hilite_padding": 3          # 选中高亮块的内边距（默认 2）

  # ── 字体：Source Han Sans VF（思源黑体 Default 区 ≈ 日式字形）──
  "style/font_face": "Source Han Sans VF"
  "style/label_font_face": "Source Han Sans VF"
  "style/comment_font_face": "Source Han Sans VF"

  # ── 字号 ──
  "style/font_point": 12            # 候选词 + 编码行（拼音）
  "style/label_font_point": 11      # 序号 1. 2. …
  "style/comment_font_point": 11    # 注释（反查 / 形码方案才显示，平时拼音无注释）

  # ── 应用选项：指定程序里改初始状态（按需增删进程名）──
  # Weasel 15.0+ 进程名大小写不敏感；每个 app 可设 ascii_mode / inline_preedit / vim_mode。
  # 现默认：终端类默认英文、Firefox 内嵌编码；编辑器按需取消注释。
  app_options:
    cmd.exe:               { ascii_mode: true }    # 终端默认英文
    conhost.exe:           { ascii_mode: true }
    powershell.exe:        { ascii_mode: true }
    pwsh.exe:              { ascii_mode: true }
    WindowsTerminal.exe:   { ascii_mode: true }
    firefox.exe:           { inline_preedit: true } # Firefox 编码内嵌（weasel.yaml 默认即如此，显式保留）
    # code.exe:            { ascii_mode: true }     # VS Code 默认英文（频繁输中文则别开）
    # nvim-qt.exe:         { ascii_mode: true, vim_mode: true }  # Vim：Esc/Ctrl-[ 自动切英文
